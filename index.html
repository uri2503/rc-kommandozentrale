<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC Kommandozentrale</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: #0f0f0f; color: #e8e8e8; min-height: 100vh; }

  header { padding: 20px 24px 16px; border-bottom: 1px solid #222; position: sticky; top: 0; background: #0f0f0f; z-index: 100; }
  .logo { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; margin-bottom: 12px; }
  .logo span { color: #c8a96e; }

  .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid #333; background: transparent; color: #888; font-size: 12px; cursor: pointer; font-family: inherit; }
  .filter-btn.active { background: #c8a96e; border-color: #c8a96e; color: #000; font-weight: 600; }

  .search-input { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #e8e8e8; font-size: 14px; font-family: inherit; outline: none; }
  .search-input:focus { border-color: #c8a96e; }
  .search-input::placeholder { color: #555; }

  main { padding: 16px; max-width: 1400px; margin: 0 auto; }

  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #555; margin: 24px 0 10px; padding-bottom: 8px; border-bottom: 1px solid #1e1e1e; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }

  .card { background: #161616; border: 1px solid #222; border-radius: 10px; padding: 14px; }
  .card.hidden { display: none; }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .card-title { font-size: 15px; font-weight: 600; color: #fff; }
  .card-repo { font-size: 11px; color: #555; margin-top: 2px; font-family: monospace; }

  .status { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 12px; white-space: nowrap; flex-shrink: 0; }
  .status-live   { background: #0d2b1a; color: #4ade80; }
  .status-wip    { background: #2b2000; color: #f59e0b; }
  .status-pause  { background: #1e1e1e; color: #666; }
  .status-intern { background: #1a1a2e; color: #818cf8; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; background: #1e1e1e; color: #666; border: 1px solid #2a2a2a; }

  .card-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .link-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; text-decoration: none; border: 1px solid #2a2a2a; background: #1c1c1c; color: #aaa; }
  .link-btn.disabled { opacity: 0.3; pointer-events: none; }
  .link-btn:not(.disabled):hover { background: #242424; border-color: #444; color: #fff; }
  .link-btn.deploy:hover  { border-color: #58a6ff; color: #58a6ff; }
  .link-btn.supabase:hover { border-color: #3ecf8e; color: #3ecf8e; }
  .link-btn.stripe:hover  { border-color: #a78bfa; color: #a78bfa; }
  .link-btn.live:hover    { border-color: #c8a96e; color: #c8a96e; }

  .brand-rc          { border-left: 3px solid #c8a96e; }
  .brand-eiswerk     { border-left: 3px solid #1a6b8a; }
  .brand-gtue        { border-left: 3px solid #E3001B; }
  .brand-baudesk     { border-left: 3px solid #2563eb; }
  .brand-betriebspass{ border-left: 3px solid #059669; }
  .brand-autoai      { border-left: 3px solid #7c3aed; }
  .brand-intern      { border-left: 3px solid #444; }

  .stats-bar { display: flex; gap: 16px; padding: 10px 0 4px; flex-wrap: wrap; }
  .stat { font-size: 12px; color: #555; }
  .stat strong { color: #888; }

  .loading { text-align: center; padding: 60px; color: #555; font-size: 14px; }
  .error-msg { text-align: center; padding: 40px; color: #e55; font-size: 13px; }

  .section-wrap.hidden { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">RC <span>Kommandozentrale</span></div>
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" onclick="setFilter('all',this)">Alle</button>
    <button class="filter-btn" onclick="setFilter('rc',this)">RC</button>
    <button class="filter-btn" onclick="setFilter('eiswerk',this)">Eiswerk</button>
    <button class="filter-btn" onclick="setFilter('gtue',this)">GTÜ</button>
    <button class="filter-btn" onclick="setFilter('baudesk',this)">BauDesk</button>
    <button class="filter-btn" onclick="setFilter('betriebspass',this)">Betriebspass</button>
    <button class="filter-btn" onclick="setFilter('autoai',this)">AutoAI</button>
    <button class="filter-btn" onclick="setFilter('intern',this)">Intern</button>
  </div>
  <input class="search-input" type="text" placeholder="Projekt suchen…" oninput="filterCards()" id="searchInput">
</header>

<main>
  <div class="stats-bar">
    <div class="stat"><strong id="visibleCount">…</strong> Projekte</div>
    <div class="stat">🟢 Live &nbsp;🟡 In Arbeit &nbsp;🔴 Pausiert &nbsp;🔵 Intern</div>
  </div>
  <div id="container"><div class="loading">Projekte werden geladen…</div></div>
</main>

<script>
var SUPABASE_URL = 'https://ysqzdqazcgyuzdorauiq.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzcXpkcWF6Y2d5dXpkb3JhdWlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI4OTI4MjEsImV4cCI6MjA1ODQ2ODgyMX0.PIiMUPOLNbFLdC5TFcbNMh8HUwGSFHnPSZ8XwqrfPSA';

var activeFilter = 'all';
var allProjekte = [];

var BRAND_LABELS = {
  rc: '🔧 Riedel Classics',
  eiswerk: '🧊 Oldtimer Eiswerk',
  gtue: '🔴 GTÜ — Steffen Höhn',
  baudesk: '🏗️ BauDesk — MUSA',
  betriebspass: '🛡️ Betriebspass',
  autoai: '🤖 AutoAI Tools',
  intern: '🔧 Sonstige / Intern'
};

var BRAND_ORDER = ['rc','eiswerk','gtue','baudesk','betriebspass','autoai','intern'];

function statusLabel(s) {
  if (s === 'live')   return '<div class="status status-live"><div class="dot"></div>Live</div>';
  if (s === 'wip')    return '<div class="status status-wip"><div class="dot"></div>In Arbeit</div>';
  if (s === 'pause')  return '<div class="status status-pause"><div class="dot"></div>Pausiert</div>';
  if (s === 'intern') return '<div class="status status-intern"><div class="dot"></div>Intern</div>';
  return '';
}

function renderCard(p) {
  var deployUrl = 'https://github.com/uri2503/' + p.repo + '/settings/pages';
  var liveBtn = p.live_url
    ? '<a class="link-btn live" href="' + p.live_url + '" target="_blank">↗ Live</a>'
    : '<span class="link-btn disabled">↗ kein Pages</span>';
  var supaBtn = p.hat_supabase
    ? '<a class="link-btn supabase" href="https://supabase.com/dashboard/project/' + SUPABASE_URL.split('.')[0].split('//')[1] + '/editor" target="_blank">◈ Supabase</a>'
    : '<span class="link-btn disabled">◈ kein Supabase</span>';
  var stripeBtn = p.hat_stripe
    ? '<a class="link-btn stripe" href="https://dashboard.stripe.com" target="_blank">◇ Stripe ' + (p.stripe_info ? p.stripe_info : '') + '</a>'
    : '<span class="link-btn disabled">◇ kein Stripe</span>';
  var tags = '';
  if (p.tags && p.tags.length) {
    for (var i = 0; i < p.tags.length; i++) {
      tags += '<span class="tag">' + p.tags[i] + '</span>';
    }
  }
  return '<div class="card brand-' + p.brand + '" data-brand="' + p.brand + '" data-name="' + (p.name + ' ' + p.repo).toLowerCase() + '">' +
    '<div class="card-header"><div><div class="card-title">' + p.name + '</div><div class="card-repo">' + p.repo + '</div></div>' + statusLabel(p.status) + '</div>' +
    (tags ? '<div class="card-tags">' + tags + '</div>' : '') +
    '<div class="card-links"><a class="link-btn deploy" href="' + deployUrl + '" target="_blank">⬡ Deploy</a>' + liveBtn + supaBtn + stripeBtn + '</div>' +
    '</div>';
}

function renderAll() {
  var container = document.getElementById('container');
  var html = '';
  for (var b = 0; b < BRAND_ORDER.length; b++) {
    var brand = BRAND_ORDER[b];
    var projekte = [];
    for (var i = 0; i < allProjekte.length; i++) {
      if (allProjekte[i].brand === brand) projekte.push(allProjekte[i]);
    }
    if (!projekte.length) continue;
    projekte.sort(function(a,b){ return a.sort_order - b.sort_order; });
    html += '<div class="section-wrap" data-brand="' + brand + '">';
    html += '<div class="section-label">' + (BRAND_LABELS[brand] || brand) + '</div>';
    html += '<div class="grid">';
    for (var j = 0; j < projekte.length; j++) {
      html += renderCard(projekte[j]);
    }
    html += '</div></div>';
  }
  container.innerHTML = html;
  filterCards();
}

function setFilter(brand, btn) {
  activeFilter = brand;
  var btns = document.querySelectorAll('.filter-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  filterCards();
}

function filterCards() {
  var search = document.getElementById('searchInput').value.toLowerCase();
  var cards = document.querySelectorAll('.card');
  var sections = document.querySelectorAll('.section-wrap');
  var visible = 0;

  for (var i = 0; i < cards.length; i++) {
    var card = cards[i];
    var brand = card.getAttribute('data-brand');
    var name = card.getAttribute('data-name') || '';
    var matchBrand = (activeFilter === 'all') || (brand === activeFilter);
    var matchSearch = !search || name.indexOf(search) > -1;
    if (matchBrand && matchSearch) { card.classList.remove('hidden'); visible++; }
    else card.classList.add('hidden');
  }

  for (var j = 0; j < sections.length; j++) {
    var sec = sections[j];
    var sb = sec.getAttribute('data-brand');
    var visibleInSec = sec.querySelectorAll('.card:not(.hidden)').length;
    sec.classList.toggle('hidden', visibleInSec === 0);
  }

  document.getElementById('visibleCount').innerText = visible;
}

function loadProjekte() {
  fetch(SUPABASE_URL + '/rest/v1/rc_projekte?select=*&order=sort_order.asc', {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY
    }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!Array.isArray(data) || data.length === 0) {
      document.getElementById('container').innerHTML = '<div class="error-msg">Keine Projekte gefunden.</div>';
      return;
    }
    allProjekte = data;
    renderAll();
  })
  .catch(function(err) {
    document.getElementById('container').innerHTML = '<div class="error-msg">Fehler beim Laden: ' + err.message + '</div>';
  });
}

loadProjekte();
</script>
</body>
</html>
