<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC Kommandozentrale</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: #0f0f0f; color: #e8e8e8; min-height: 100vh; }

  header { padding: 20px 24px 16px; border-bottom: 1px solid #222; position: sticky; top: 0; background: #0f0f0f; z-index: 100; }
  .logo { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; margin-bottom: 12px; }
  .logo span { color: #c8a96e; }

  .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid #333; background: transparent; color: #888; font-size: 12px; cursor: pointer; font-family: inherit; }
  .filter-btn.active { background: #c8a96e; border-color: #c8a96e; color: #000; font-weight: 600; }

  .search-input { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #e8e8e8; font-size: 14px; font-family: inherit; outline: none; }
  .search-input:focus { border-color: #c8a96e; }
  .search-input::placeholder { color: #555; }

  main { padding: 16px; max-width: 1400px; margin: 0 auto; }

  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #555; margin: 24px 0 10px; padding-bottom: 8px; border-bottom: 1px solid #1e1e1e; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }

  .card { background: #161616; border: 1px solid #222; border-radius: 10px; padding: 14px; transition: border-color 0.15s; }
  .card.hidden { display: none; }
  .card:hover { border-color: #2a2a2a; }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .card-title { font-size: 15px; font-weight: 600; color: #fff; }
  .card-repo { font-size: 11px; color: #555; margin-top: 2px; font-family: monospace; }

  .status { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 12px; white-space: nowrap; flex-shrink: 0; }
  .status-live   { background: #0d2b1a; color: #4ade80; }
  .status-wip    { background: #2b2000; color: #f59e0b; }
  .status-pause  { background: #1e1e1e; color: #666; }
  .status-intern { background: #1a1a2e; color: #818cf8; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; background: #1e1e1e; color: #666; border: 1px solid #2a2a2a; }

  .card-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .link-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; text-decoration: none; border: 1px solid #2a2a2a; background: #1c1c1c; color: #aaa; cursor: pointer; }
  .link-btn.disabled { opacity: 0.3; pointer-events: none; }
  .link-btn:not(.disabled):hover { background: #242424; border-color: #444; color: #fff; }
  .link-btn.deploy:hover   { border-color: #58a6ff; color: #58a6ff; }
  .link-btn.supabase:hover { border-color: #3ecf8e; color: #3ecf8e; }
  .link-btn.stripe:hover   { border-color: #a78bfa; color: #a78bfa; }
  .link-btn.live:hover     { border-color: #c8a96e; color: #c8a96e; }
  .link-btn.extra          { border-color: #3a2a3a; color: #c084fc; }
  .link-btn.extra:hover    { border-color: #f472b6; color: #f472b6; }

  /* ── Inline Edit Felder ── */
  .edit-section { margin-top: 10px; border-top: 1px solid #1e1e1e; padding-top: 10px; }

  .edit-row { margin-bottom: 8px; }
  .edit-label { font-size: 10px; color: #555; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
  .edit-label span { color: #444; font-weight: 400; text-transform: none; letter-spacing: 0; font-size: 10px; }

  .edit-field { width: 100%; background: #111; border: 1px solid #2a2a2a; border-radius: 6px; color: #ccc; font-size: 12px; font-family: inherit; padding: 6px 8px; resize: none; outline: none; line-height: 1.5; }
  .edit-field:focus { border-color: #c8a96e; }
  .edit-field::placeholder { color: #3a3a3a; }

  .save-btn { margin-top: 6px; padding: 4px 10px; border-radius: 5px; border: 1px solid #333; background: #1e1e1e; color: #888; font-size: 11px; cursor: pointer; font-family: inherit; }
  .save-btn:hover { background: #c8a96e; border-color: #c8a96e; color: #000; font-weight: 600; }
  .save-btn.saving { color: #f59e0b; border-color: #f59e0b; }
  .save-btn.saved  { color: #4ade80; border-color: #4ade80; }

  /* ── Brand Colors ── */
  .brand-rc          { border-left: 3px solid #c8a96e; }
  .brand-eiswerk     { border-left: 3px solid #1a6b8a; }
  .brand-gtue        { border-left: 3px solid #E3001B; }
  .brand-baudesk     { border-left: 3px solid #2563eb; }
  .brand-betriebspass{ border-left: 3px solid #059669; }
  .brand-autoai      { border-left: 3px solid #7c3aed; }
  .brand-intern      { border-left: 3px solid #444; }

  .stats-bar { display: flex; gap: 16px; padding: 10px 0 4px; flex-wrap: wrap; }
  .stat { font-size: 12px; color: #555; }
  .stat strong { color: #888; }

  .loading { text-align: center; padding: 60px; color: #555; font-size: 14px; }
  .error-msg { text-align: center; padding: 40px; color: #e55; font-size: 13px; }
  .section-wrap.hidden { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">RC <span>Kommandozentrale</span></div>
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" onclick="setFilter('all',this)">Alle</button>
    <button class="filter-btn" onclick="setFilter('rc',this)">RC</button>
    <button class="filter-btn" onclick="setFilter('eiswerk',this)">Eiswerk</button>
    <button class="filter-btn" onclick="setFilter('gtue',this)">GTÜ</button>
    <button class="filter-btn" onclick="setFilter('baudesk',this)">BauDesk</button>
    <button class="filter-btn" onclick="setFilter('betriebspass',this)">Betriebspass</button>
    <button class="filter-btn" onclick="setFilter('autoai',this)">AutoAI</button>
    <button class="filter-btn" onclick="setFilter('intern',this)">Intern</button>
  </div>
  <input class="search-input" type="text" placeholder="Projekt suchen…" oninput="filterCards()" id="searchInput">
</header>

<main>
  <div class="stats-bar">
    <div class="stat"><strong id="visibleCount">…</strong> Projekte</div>
    <div class="stat">🟢 Live &nbsp;🟡 In Arbeit &nbsp;🔴 Pausiert &nbsp;🔵 Intern</div>
  </div>
  <div id="container"><div class="loading">Projekte werden geladen…</div></div>
</main>

<datalist id="brand-suggestions"></datalist>

<script>
var SUPABASE_URL = 'https://ysqzdqazcgyuzdorauiq.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzcXpkcWF6Y2d5dXpkb3JhdWlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODM0NzcsImV4cCI6MjA5NTU1OTQ3N30.u5cbSVniUl5Zvlf2rdpnjtvDyKvv9csmPwvdtnEwWzE';

var activeFilter = 'all';
var allProjekte = [];

var BRAND_LABELS = {
  rc: '🔧 Riedel Classics',
  eiswerk: '🧊 Oldtimer Eiswerk',
  gtue: '🔴 GTÜ — Steffen Höhn',
  baudesk: '🏗️ BauDesk — MUSA',
  betriebspass: '🛡️ Betriebspass',
  autoai: '🤖 AutoAI Tools',
  baeckerei: '🥐 Bäckerei',
  intern: '🔧 Sonstige / Intern'
};
var BRAND_COLORS = {
  rc: '#c8a96e', eiswerk: '#1a6b8a', gtue: '#E3001B',
  baudesk: '#2563eb', betriebspass: '#059669', autoai: '#7c3aed',
  baeckerei: '#d97706', intern: '#444'
};
var BRAND_ORDER = ['rc','eiswerk','gtue','baudesk','betriebspass','autoai','baeckerei','intern'];

function getBrandOrder(brands) {
  var ordered = [];
  for (var i=0; i<BRAND_ORDER.length; i++) {
    if (brands.indexOf(BRAND_ORDER[i]) > -1) ordered.push(BRAND_ORDER[i]);
  }
  for (var j=0; j<brands.length; j++) {
    if (ordered.indexOf(brands[j]) === -1) ordered.push(brands[j]);
  }
  return ordered;
}

function statusLabel(s) {
  if (s==='live')   return '<div class="status status-live"><div class="dot"></div>Live</div>';
  if (s==='wip')    return '<div class="status status-wip"><div class="dot"></div>In Arbeit</div>';
  if (s==='pause')  return '<div class="status status-pause"><div class="dot"></div>Pausiert</div>';
  if (s==='intern') return '<div class="status status-intern"><div class="dot"></div>Intern</div>';
  return '';
}

function renderCard(p) {
  var id = p.id;
  var deployUrl = 'https://github.com/uri2503/' + p.repo + '/settings/pages';

  var liveBtn = p.live_url
    ? '<a class="link-btn live" href="' + p.live_url + '" target="_blank">↗ Live</a>'
    : '<span class="link-btn disabled">↗ kein Pages</span>';
  var supaBtn = p.hat_supabase
    ? '<a class="link-btn supabase" href="https://supabase.com/dashboard/project/ysqzdqazcgyuzdorauiq/editor" target="_blank">◈ Supabase</a>'
    : '<span class="link-btn disabled">◈ kein Supabase</span>';
  var stripeBtn = p.hat_stripe
    ? '<a class="link-btn stripe" href="https://dashboard.stripe.com" target="_blank">◇ Stripe ' + (p.stripe_info||'') + '</a>'
    : '<span class="link-btn disabled">◇ kein Stripe</span>';

  var tags = '';
  if (p.tags && p.tags.length) {
    for (var i=0; i<p.tags.length; i++) tags += '<span class="tag">'+p.tags[i]+'</span>';
  }

  // Extra Links als Buttons anzeigen
  var extraLinks = '';
  if (p.extra_links && p.extra_links.length) {
    for (var j=0; j<p.extra_links.length; j++) {
      var el = p.extra_links[j];
      extraLinks += '<a class="link-btn extra" href="'+el.url+'" target="_blank">⊕ '+el.label+'</a>';
    }
  }

  // Extra Links als Text für Editor (Label|URL pro Zeile)
  var extraLinksText = '';
  if (p.extra_links && p.extra_links.length) {
    for (var k=0; k<p.extra_links.length; k++) {
      extraLinksText += p.extra_links[k].label + '|' + p.extra_links[k].url + '\n';
    }
    extraLinksText = extraLinksText.trim();
  }

  var memoVal = p.memo || '';

  var brandColor = BRAND_COLORS[p.brand] || '#666';
  return '<div class="card" style="border-left:3px solid '+brandColor+'" data-brand="'+p.brand+'" data-name="'+(p.name+' '+p.repo).toLowerCase()+'" data-id="'+id+'">' +
    '<div class="card-header"><div><div class="card-title">'+p.name+'</div><div class="card-repo">'+p.repo+'</div></div>'+statusLabel(p.status)+'</div>' +
    (tags ? '<div class="card-tags">'+tags+'</div>' : '') +
    '<div class="card-links"><a class="link-btn deploy" href="'+deployUrl+'" target="_blank">⬡ Deploy</a>'+liveBtn+supaBtn+stripeBtn+extraLinks+'</div>' +

    // ── Edit Bereich ──
    '<div class="edit-section">' +

      '<div class="edit-row" style="display:flex;gap:8px;margin-bottom:8px;">' +
        '<div style="flex:1">' +
          '<div class="edit-label">🏷 Gruppe / Brand</div>' +
          '<input class="edit-field" id="brand-'+id+'" value="'+p.brand+'" list="brand-suggestions" placeholder="z.B. baeckerei, gtue, rc…" style="padding:5px 8px;">' +
        '</div>' +
        '<div style="width:100px">' +
          '<div class="edit-label">📊 Status</div>' +
          '<select class="edit-field" id="status-'+id+'" style="padding:5px 4px;">' +
            '<option value="live"'+(p.status==='live'?' selected':'')+'>🟢 Live</option>' +
            '<option value="wip"'+(p.status==='wip'?' selected':'')+'>🟡 In Arbeit</option>' +
            '<option value="pause"'+(p.status==='pause'?' selected':'')+'>🔴 Pausiert</option>' +
            '<option value="intern"'+(p.status==='intern'?' selected':'')+'>🔵 Intern</option>' +
          '</select>' +
        '</div>' +
      '</div>' +

      '<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;">' +
        '<div style="flex:1">' +
        '<div class="edit-label">📎 Extra Links <span>Label|URL — eine pro Zeile</span></div>' +
        '<textarea class="edit-field" rows="2" id="links-'+id+'" placeholder="Admin|https://...\nDashboard|https://...">'+extraLinksText+'</textarea>' +
        '</div>' +
        '<div style="width:64px">' +
          '<div class="edit-label">⬆ Sort</div>' +
          '<input type="number" class="edit-field" id="sort-'+id+'" value="'+(p.sort_order||99)+'" style="text-align:center;padding:5px 4px;">' +
        '</div>' +
      '</div>' +

      '<div class="edit-row">' +
        '<div class="edit-label">💬 Memo / Notiz</div>' +
        '<textarea class="edit-field" rows="2" id="memo-'+id+'" placeholder="Offene Punkte, nächster Schritt…">'+memoVal+'</textarea>' +
      '</div>' +

      '<button class="save-btn" id="save-'+id+'" onclick="saveCard(\''+id+'\')">💾 Speichern</button>' +

    '</div>' +
  '</div>';
}

function saveCard(id) {
  var btn = document.getElementById('save-'+id);
  var memoEl = document.getElementById('memo-'+id);
  var linksEl = document.getElementById('links-'+id);
  var sortEl = document.getElementById('sort-'+id);
  var brandEl = document.getElementById('brand-'+id);
  var statusEl = document.getElementById('status-'+id);

  var memo = memoEl.value.trim();
  var sortOrder = sortEl ? parseInt(sortEl.value) || 99 : 99;
  var brand = brandEl ? brandEl.value.trim().toLowerCase() : null;
  var status = statusEl ? statusEl.value : null;

  // Extra Links parsen: Label|URL
  var extraLinks = [];
  var lines = linksEl.value.trim().split('\n');
  for (var i=0; i<lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    var parts = line.split('|');
    if (parts.length >= 2) {
      extraLinks.push({ label: parts[0].trim(), url: parts[1].trim() });
    }
  }

  btn.textContent = '⏳ Speichern…';
  btn.className = 'save-btn saving';

  fetch(SUPABASE_URL + '/rest/v1/rc_projekte?id=eq.' + id, {
    method: 'PATCH',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify({ memo: memo, extra_links: extraLinks, sort_order: sortOrder, brand: brand, status: status })
  })
  .then(function(r) {
    if (r.ok) {
      btn.textContent = '✅ Gespeichert';
      btn.className = 'save-btn saved';
      // Lokale Daten updaten
      for (var i=0; i<allProjekte.length; i++) {
        if (allProjekte[i].id === id) {
          allProjekte[i].memo = memo;
          allProjekte[i].extra_links = extraLinks;
          allProjekte[i].sort_order = sortOrder;
          if (brand) allProjekte[i].brand = brand;
          if (status) allProjekte[i].status = status;
        }
      }
      setTimeout(function(){ btn.textContent = '💾 Speichern'; btn.className = 'save-btn'; renderAll(); }, 1500);
    } else {
      btn.textContent = '❌ Fehler';
      btn.className = 'save-btn';
    }
  })
  .catch(function() {
    btn.textContent = '❌ Fehler';
    btn.className = 'save-btn';
  });
}

function renderAll() {
  var container = document.getElementById('container');
  // Alle vorhandenen Brands sammeln
  var allBrands = [];
  for (var x=0; x<allProjekte.length; x++) {
    var b = allProjekte[x].brand;
    if (allBrands.indexOf(b) === -1) allBrands.push(b);
  }
  var orderedBrands = getBrandOrder(allBrands);

  // Filterbuttons dynamisch neu aufbauen
  var filterBar = document.getElementById('filterBar');
  if (!filterBar) return;
  var btns = '<button class="filter-btn '+(activeFilter==='all'?'active':'')+'" onclick="setFilter(\'all\',this)">Alle</button>';
  for (var f=0; f<orderedBrands.length; f++) {
    var fb = orderedBrands[f];
    var label = BRAND_LABELS[fb] ? BRAND_LABELS[fb].replace(/^[^ ]+ /,'') : fb.charAt(0).toUpperCase()+fb.slice(1);
    btns += '<button class="filter-btn '+(activeFilter===fb?'active':'')+'" onclick="setFilter(\''+fb+'\',this)">'+label+'</button>';
  }
  filterBar.innerHTML = btns;

  var html = '';
  for (var b=0; b<orderedBrands.length; b++) {
    var brand = orderedBrands[b];
    var projekte = [];
    for (var i=0; i<allProjekte.length; i++) {
      if (allProjekte[i].brand === brand) projekte.push(allProjekte[i]);
    }
    if (!projekte.length) continue;
    projekte.sort(function(a,bb){ return (a.sort_order||99) - (bb.sort_order||99); });
    var color = BRAND_COLORS[brand] || '#666';
    html += '<div class="section-wrap" data-brand="'+brand+'">';
    html += '<div class="section-label" style="border-bottom-color:'+color+'22;">'+(BRAND_LABELS[brand]||'📁 '+brand.charAt(0).toUpperCase()+brand.slice(1))+'</div>';
    html += '<div class="grid">';
    for (var j=0; j<projekte.length; j++) html += renderCard(projekte[j]);
    html += '</div></div>';
  }
  container.innerHTML = html;

  // Datalist mit vorhandenen Brands befüllen
  var dl = document.getElementById('brand-suggestions');
  if (dl) {
    dl.innerHTML = '';
    for (var d=0; d<orderedBrands.length; d++) {
      var opt = document.createElement('option');
      opt.value = orderedBrands[d];
      dl.appendChild(opt);
    }
  }

  filterCards();
}

function setFilter(brand, btn) {
  activeFilter = brand;
  var btns = document.querySelectorAll('.filter-btn');
  for (var i=0; i<btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  filterCards();
}

function filterCards() {
  var search = document.getElementById('searchInput').value.toLowerCase();
  var cards = document.querySelectorAll('.card');
  var sections = document.querySelectorAll('.section-wrap');
  var visible = 0;
  for (var i=0; i<cards.length; i++) {
    var card = cards[i];
    var matchBrand = (activeFilter==='all') || (card.getAttribute('data-brand')===activeFilter);
    var matchSearch = !search || (card.getAttribute('data-name')||'').indexOf(search) > -1;
    if (matchBrand && matchSearch) { card.classList.remove('hidden'); visible++; }
    else card.classList.add('hidden');
  }
  for (var j=0; j<sections.length; j++) {
    sections[j].classList.toggle('hidden', sections[j].querySelectorAll('.card:not(.hidden)').length === 0);
  }
  document.getElementById('visibleCount').innerText = visible;
}

function loadProjekte() {
  fetch(SUPABASE_URL + '/rest/v1/rc_projekte?select=*&order=sort_order.asc', {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  })
  .then(function(r) { return r.json().then(function(d){ return {ok:r.ok, status:r.status, data:d}; }); })
  .then(function(res) {
    if (!res.ok) { document.getElementById('container').innerHTML = '<div class="error-msg">API Fehler '+res.status+': '+JSON.stringify(res.data)+'</div>'; return; }
    if (!Array.isArray(res.data) || !res.data.length) { document.getElementById('container').innerHTML = '<div class="error-msg">Keine Projekte gefunden.</div>'; return; }
    allProjekte = res.data;
    renderAll();
  })
  .catch(function(err) {
    document.getElementById('container').innerHTML = '<div class="error-msg">Fehler: '+err.message+'</div>';
  });
}

// RLS Update Policy aktivieren
fetch(SUPABASE_URL + '/rest/v1/', { headers: { 'apikey': SUPABASE_KEY } });
loadProjekte();
</script>
</body>
</html>
